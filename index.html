<style>
  :root{
    --bg:#010510; --bg2:#04101f; --bg3:#061528;
    --accent:#74B0D8; --accent2:#5B9BC4; --accent3:#6FA8DC;
    --txt:#FAFAFA; --muted:#9fb2c6; --faint:#5f7186;
    --ok:#5FBF8F; --warn:#F5A623; --err:#D96B56;
    --glass-bg:rgba(255,255,255,.04); --glass-bg2:rgba(116,176,216,.05);
    --glass-brd:rgba(116,176,216,.16); --glass-brd2:rgba(116,176,216,.32);
    --maxw:1200px; --r:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Jost','Century Gothic',system-ui,-apple-system,'Segoe UI',sans-serif;
    background:var(--bg); color:var(--txt); line-height:1.6; font-weight:300;
    -webkit-font-smoothing:antialiased; overflow-x:hidden; position:relative;
  }
  ::selection{background:rgba(116,176,216,.3)}

  /* ===== FUNDO CONSTELAÇÃO (AURA) ===== */
  .bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  canvas#stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6}
  .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.45;mix-blend-mode:screen}
  .blob.b1{width:50vw;height:50vw;left:-8vw;top:-10vw;background:radial-gradient(circle,rgba(116,176,216,.4),transparent 65%);animation:drift 24s ease-in-out infinite}
  .blob.b2{width:44vw;height:44vw;right:-10vw;top:16vh;background:radial-gradient(circle,rgba(91,155,196,.35),transparent 65%);animation:drift 28s ease-in-out infinite reverse}
  @keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(5vw,4vh)}}
  .beam{position:fixed;top:-12vh;right:8vw;width:38vw;height:130vh;z-index:0;pointer-events:none;
    background:linear-gradient(170deg,rgba(116,176,216,.14),rgba(116,176,216,.03) 40%,transparent 70%);
    transform:rotate(14deg);filter:blur(14px);mix-blend-mode:screen;opacity:.55;animation:beam-pulse 13s ease-in-out infinite}
  @keyframes beam-pulse{0%,100%{opacity:.4}50%{opacity:.7}}
  .aura{position:fixed;left:50%;top:35%;width:480px;height:480px;border-radius:50%;transform:translate(-50%,-50%);
    pointer-events:none;z-index:0;background:radial-gradient(circle,rgba(116,176,216,.1),transparent 60%);
    mix-blend-mode:screen;filter:blur(8px);transition:left .5s,top .5s}

  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;position:relative;z-index:2}

  /* ===== NAV ===== */
  header{position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);background:rgba(1,5,16,.62);
    border-bottom:1px solid rgba(116,176,216,.1);transition:.3s}
  header.scrolled{background:rgba(1,5,16,.86);border-bottom-color:rgba(116,176,216,.18)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:70px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:500;letter-spacing:2px;color:var(--txt)}
  .brand img{height:28px;filter:drop-shadow(0 0 8px rgba(116,176,216,.3))}
  .user-menu{display:flex;align-items:center;gap:14px;font-size:13px}
  .user-menu .name{color:var(--muted)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border-radius:999px;
    padding:11px 22px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;
    transition:.22s;font-family:inherit;position:relative}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#041020;box-shadow:0 8px 24px rgba(116,176,216,.26)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(116,176,216,.38)}
  .btn-ghost{border-color:var(--glass-brd2);color:var(--muted);background:var(--glass-bg);backdrop-filter:blur(8px)}
  .btn-ghost:hover{color:var(--accent);border-color:var(--accent)}

  main{min-height:100vh;padding:60px 0}

  /* ===== CARD ALERTAS (prioritário) ===== */
  .alerts-card{background:var(--glass-bg);border:1px solid var(--glass-brd);border-radius:var(--r);
    padding:32px;backdrop-filter:blur(12px);margin-bottom:32px;animation:fadeUp .6s cubic-bezier(.2,.7,.3,1)}
  .alerts-card h2{font-size:18px;font-weight:400;margin-bottom:20px;display:flex;align-items:center;gap:10px}
  .alerts-card h2::before{content:'⚠️';font-size:22px}
  .alert-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-left:3px solid;border-radius:8px;
    background:rgba(255,255,255,.02);margin-bottom:10px;font-size:14px}
  .alert-item.error{border-left-color:var(--err);background:rgba(217,107,86,.06)}
  .alert-item.warn{border-left-color:var(--warn);background:rgba(245,166,35,.06)}
  .alert-item.ok{border-left-color:var(--ok);background:rgba(95,191,143,.06)}
  .alert-item .icon{font-size:18px;min-width:20px}
  .alert-item .text{flex:1}
  .alert-item .text strong{color:var(--txt);font-weight:500}
  .alert-item .text .sub{color:var(--muted);font-size:12px;margin-top:3px}
  .alert-item .action{display:flex;gap:8px}
  .alert-item .action a,.alert-item .action button{padding:6px 12px;font-size:12px;border-radius:6px;
    border:none;cursor:pointer;background:var(--accent);color:#041020;font-weight:500;transition:.2s}
  .alert-item .action a:hover,.alert-item .action button:hover{opacity:.85;transform:translateY(-1px)}

  .no-alerts{text-align:center;padding:20px;color:var(--muted);font-size:13px}

  /* ===== DASHBOARD GRID ===== */
  .dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-top:32px}

  .card{background:var(--glass-bg);border:1px solid var(--glass-brd);border-radius:var(--r);
    padding:24px;backdrop-filter:blur(12px);transition:.28s;cursor:pointer;animation:fadeUp .6s cubic-bezier(.2,.7,.3,1) both}
  .card:nth-child(2){animation-delay:.08s}.card:nth-child(3){animation-delay:.16s}.card:nth-child(4){animation-delay:.24s}
  .card:nth-child(5){animation-delay:.32s}.card:nth-child(6){animation-delay:.4s}
  .card:hover{transform:translateY(-6px);border-color:var(--glass-brd2);background:var(--glass-bg2)}
  .card h3{font-size:15px;font-weight:400;margin-bottom:12px;color:var(--txt)}
  .card .meta{font-size:12px;color:var(--muted);margin-bottom:16px}
  .card .value{font-size:26px;font-weight:200;color:var(--accent);margin-bottom:10px}
  .card .stat{font-size:13px;color:var(--muted)}
  .card .btn{margin-top:14px;width:100%;justify-content:center}

  .card.alert{border-color:var(--glass-brd);background:linear-gradient(160deg,rgba(217,107,86,.08),rgba(116,176,216,.02))}

  /* ===== SKELETON ===== */
  .skeleton{background:var(--glass-bg);border:1px solid var(--glass-brd);border-radius:8px;
    padding:12px;margin-bottom:10px;min-height:40px;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

  .loading{text-align:center;padding:40px;color:var(--muted)}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--glass-brd);
    border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ===== LOGIN ===== */
  .login-page{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-box{background:var(--glass-bg);border:1px solid var(--glass-brd);border-radius:24px;
    padding:40px;backdrop-filter:blur(14px);max-width:400px;width:100%;animation:fadeUp .6s ease}
  .login-box h2{font-size:26px;font-weight:200;margin-bottom:8px;text-align:center}
  .login-box p{color:var(--muted);font-size:14px;text-align:center;margin-bottom:24px}
  .form{display:grid;gap:12px;margin-bottom:20px}
  .form input{width:100%;background:rgba(1,5,16,.6);border:1px solid var(--glass-brd);
    border-radius:12px;padding:13px 15px;color:var(--txt);font-family:inherit;font-size:14px;transition:.2s}
  .form input::placeholder{color:var(--faint)}
  .form input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(116,176,216,.14)}
  .login-box .btn{width:100%;margin-bottom:14px}

  }

  // ===== CONSTELAÇÃO =====
  (function(){
    const c=document.getElementById('stars'),x=c.getContext('2d'),pts=[],W,H;
    function size(){W=c.width=innerWidth;H=c.height=innerHeight;}
    function init(){pts=[];const n=Math.min(100,Math.floor(W*H/14000));
      for(let i=0;i<n;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22});}
    function tick(){x.clearRect(0,0,W,H);
      for(let i=0;i<pts.length;i++){const p=pts[i];p.x+=p.vx;p.y+=p.vy;
        if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
        x.beginPath();x.arc(p.x,p.y,1.2,0,7);x.fillStyle='rgba(116,176,216,.55)';x.fill();
        for(let j=i+1;j<pts.length;j++){const q=pts[j],dx=p.x-q.x,dy=p.y-q.y,d=dx*dx+dy*dy;
          if(d<14000){x.beginPath();x.moveTo(p.x,p.y);x.lineTo(q.x,q.y);
            x.strokeStyle='rgba(116,176,216,'+(.12*(1-d/14000))+')';x.stroke();}}}
      requestAnimationFrame(tick);}
    size();init();tick();addEventListener('resize',()=>{size();init();});}
  )();

  // ===== AURA SEGUE CURSOR =====
  addEventListener('pointermove',e=>{
    document.getElementById('aura').style.left=e.clientX+'px';
    document.getElementById('aura').style.top=e.clientY+'px';
  },{passive:true});

  // ===== NAV SCROLL =====
  addEventListener('scroll',()=>{
    document.getElementById('header').classList.toggle('scrolled',scrollY>20);
  },{passive:true});

  // ===== LOGIN =====
  window.handleLogin=async(e)=>{
    e.preventDefault();
    const email=document.getElementById('email').value;
    const password=document.getElementById('password').value;

    if(!supabase){await initSupabase();}
    const{data,error}=await supabase.auth.signInWithPassword({email,password});
    if(error){alert('Erro: '+error.message);return;}

    currentUser=data.user;
    showMainPage();
    loadDashboard();
  };

  // ===== LOGOUT =====
  window.handleLogout=async()=>{
    if(supabase)await supabase.auth.signOut();
    currentUser=null;
    showLoginPage();
  };

  // ===== SHOW/HIDE PAGES =====
  function showLoginPage(){
    document.getElementById('loginPage').style.display='flex';
    document.getElementById('mainPage').style.display='none';
  }
  function showMainPage(){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainPage').style.display='block';
    document.getElementById('userName').textContent=currentUser?.email||'Usuário';
  }

  // ===== LOAD DASHBOARD =====
  async function loadDashboard(){
    if(!supabase)return;

    // Buscar dados do cliente
    const{data:cliente}=await supabase
      .from('clientes')
      .select('*')
      .eq('email',currentUser.email)
      .single();

    if(!cliente){
      document.getElementById('alertsList').innerHTML='<p class="no-alerts">Nenhum acesso configurado</p>';
      document.getElementById('dashboard').innerHTML='';
      return;
    }

    // Renderizar alertas
    await renderAlerts(cliente);

    // Renderizar dashboard por tipo
    await renderDashboard(cliente);
  }

  // ===== RENDER ALERTAS =====
  async function renderAlerts(cliente){
    const alerts=[];

    // Boletos vencidos
    if(cliente.tipo_cliente==='inovar'||cliente.tipo_cliente==='financiamento'||cliente.tipo_cliente==='consorcio'){
      const{data:boletos}=await supabase
        .from('boletos')
        .select('*')
        .eq('cliente_id',cliente.id)
        .lt('data_vencimento',new Date().toISOString().split('T')[0]);

      if(boletos?.length){
        alerts.push({
          type:'error',
          icon:'❌',
          title:`${boletos.length} boleto(s) vencido(s)`,
          subtitle:`Total: R$ ${boletos.reduce((s,b)=>s+(b.valor||0),0).toFixed(2)}`,
          action:'Ver boletos'
        });
      }
    }

    // SLA fora do acordo
    if(cliente.tipo_cliente==='inperson_care'){
      const sla=Math.random()*100|0; // Placeholder
      if(sla<99){
        alerts.push({
          type:'warn',
          icon:'⏱️',
          title:`SLA: ${sla}% (abaixo de 99%)`,
          subtitle:'Verificar incidentes recentes',
          action:'Ver detalhes'
        });
      }else{
        alerts.push({
          type:'ok',
          icon:'✅',
          title:`SLA: ${sla}% (dentro do acordo)`,
          subtitle:'Infraestrutura operacional',
          action:null
        });
      }
    }

    // Vencimentos próximos
    if(cliente.tipo_cliente==='inovar'||cliente.tipo_cliente==='financiamento'||cliente.tipo_cliente==='consorcio'){
      const hoje=new Date();
      const semana=new Date(hoje.getTime()+7*24*60*60*1000).toISOString().split('T')[0];
      const{data:proximos}=await supabase
        .from('boletos')
        .select('*')
        .eq('cliente_id',cliente.id)
        .gt('data_vencimento',hoje.toISOString().split('T')[0])
        .lte('data_vencimento',semana);

      if(proximos?.length){
        alerts.push({
          type:'warn',
          icon:'⏰',
          title:`${proximos.length} vencimento(s) em até 7 dias`,
          subtitle:'Próximo: '+new Date(proximos[0].data_vencimento).toLocaleDateString('pt-BR'),
          action:'Gerar boleto'
        });
      }
    }

    if(alerts.length===0){
      alerts.push({type:'ok',icon:'✅',title:'Nenhuma ação prioritária',subtitle:'Tudo em dia'});
    }

    const html=alerts.map(a=>`
      <div class="alert-item ${a.type}">
        <div class="icon">${a.icon}</div>
        <div class="text">
          <strong>${a.title}</strong>
          <div class="sub">${a.subtitle}</div>
        </div>
        ${a.action?`<div class="action"><button>${a.action}</button></div>`:''}
      </div>
    `).join('');

    document.getElementById('alertsList').innerHTML=html;
  }

        </div>
      `;
    } else if(cliente.tipo_cliente==='financiamento'){
      html=`
        <div class="card">
          <h3>Boletos Pendentes</h3>
          <div class="meta">Próximos 30 dias</div>
          <div class="value" id="boletos-count">1</div>

          <button class="btn btn-ghost" onclick="alert('Ver boletos')">Ver boletos</button>
        </div>
        <div class="card">
          <h3>Cronograma (SAC/PRICE)</h3>
          <div class="meta">Seu imóvel</div>
          <div class="stat">Visualize seu cronograma de pagamento</div>
          <button class="btn btn-ghost" onclick="alert('Ver cronograma')">Ver cronograma</button>
        </div>
        <div class="card">
          <h3>Histórico de Pagamentos</h3>
          <div class="meta">Últimos 24 meses</div>
          <div class="stat">Comprovantes disponíveis</div>

        </div>
        <div class="card">
          <h3>Sistema Completo</h3>
          <div class="meta">Acesso total</div>
          <div class="stat">Gerenciador de Financiamento</div>

    } else {
      html=`<div class="card" style="grid-column:1/-1"><p style="color:var(--muted)">Dashboard não configurado para seu tipo de cliente</p></div>`;
    }

    document.getElementById('dashboard').innerHTML=html;
  }

  // ===== INIT =====
  (async()=>{
    await initSupabase();
    const{data:{session}}=await supabase.auth.getSession();
    if(session){
      currentUser=session.user;
      showMainPage();
      loadDashboard();
    }else{
      showLoginPage();
    }
  })();

  // Remove SW/cache antigos
  if('serviceWorker'in navigator){
    navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});
    if(window.caches&&caches.keys)caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).catch(()=>{});
  }
</script>
